<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASU estoques | Kitchen Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .asu-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .glass-header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #f97316; }
        .card-asu { background: #1e293b; border: 1px solid #334155; transition: all 0.3s ease; }
        .card-asu:hover { border-color: #f97316; transform: translateY(-2px); }
        input::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-40 glass-header p-4 mb-8 shadow-2xl">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-3xl font-black tracking-tighter italic uppercase text-white">ASU <span class="text-orange-500">estoques</span></h1>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Kitchen Management System</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-center">
                    <p class="text-[10px] font-black text-slate-500 uppercase">Alertas</p>
                    <p id="badge-critico" class="text-2xl font-black text-red-500 leading-none">0</p>
                </div>
                <button onclick="openModal('modal-add')" class="bg-orange-600 hover:bg-orange-500 text-white p-4 rounded-2xl shadow-lg shadow-orange-900/40 active:scale-90 transition-all">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4">
        <div class="relative mb-10">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input type="text" id="searchInput" oninput="render()" placeholder="Buscar no estoque ASU..." 
                class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-3xl py-5 pl-14 pr-6 outline-none focus:border-orange-500 text-lg transition-all shadow-inner">
        </div>

        <div id="grid-estoque" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div class="mt-16">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="activity" class="w-4 h-4"></i> Log de Atividade ASU
                </h2>
                <button onclick="limparHistorico()" class="text-[10px] text-slate-600 hover:text-red-500 uppercase font-bold">Limpar Log</button>
            </div>
            <div id="log-container" class="space-y-2 bg-slate-900/50 p-4 rounded-3xl border border-slate-800">
                </div>
        </div>
    </main>

    <div id="modal-add" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 italic">Novo Insumo <span class="text-orange-500">ASU</span></h2>
            <div class="space-y-4">
                <input type="text" id="new-nome" placeholder="Nome do Insumo" class="w-full bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none focus:border-orange-500">
                <div class="flex gap-2">
                    <input type="number" id="new-qtd" placeholder="Qtd" class="w-1/2 bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none focus:border-orange-500">
                    <select id="new-unidade" class="w-1/2 bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none">
                        <option value="kg">kg</option><option value="un">un</option><option value="L">L</option><option value="g">g</option>
                    </select>
                </div>
                <input type="number" id="new-min" placeholder="Estoque Mínimo (Alerta)" class="w-full bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none focus:border-orange-500">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal('modal-add')" class="flex-1 font-bold text-slate-500">Cancelar</button>
                <button onclick="addItem()" class="flex-1 py-4 bg-orange-600 rounded-2xl font-bold text-white shadow-xl">Cadastrar</button>
            </div>
        </div>
    </div>

    <div id="modal-trans" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
            <h2 id="trans-title" class="text-2xl font-black mb-2 italic">Retirar</h2>
            <p id="trans-subtitle" class="text-slate-400 text-sm mb-6 uppercase tracking-widest font-bold"></p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Quantidade</label>
                    <input type="number" id="trans-qtd" placeholder="Quanto?" class="w-full bg-slate-900 p-5 rounded-2xl border border-slate-700 outline-none focus:border-orange-500 text-2xl font-black">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Quem está operando?</label>
                    <input type="text" id="trans-user" placeholder="Seu nome" class="w-full bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none focus:border-orange-500">
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal('modal-trans')" class="flex-1 font-bold text-slate-500">Cancelar</button>
                <button id="trans-btn-confirm" class="flex-1 py-4 bg-orange-600 rounded-2xl font-bold text-white shadow-xl">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // BANCO DE DADOS LOCAL (ASU DATABASE)
        let db = JSON.parse(localStorage.getItem('asu_v5_db')) || { items: [], logs: [] };
        let currentItemId = null;
        let currentType = 1; // 1 para soma, -1 para subtração

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function addItem() {
            const nome = document.getElementById('new-nome').value;
            const qtd = parseFloat(document.getElementById('new-qtd').value);
            const min = parseFloat(document.getElementById('new-min').value) || 0;
            const unidade = document.getElementById('new-unidade').value;

            if(!nome || isNaN(qtd)) return alert("Preencha o nome e a quantidade!");

            db.items.push({ id: Date.now(), nome, qtd, min, unidade });
            addLog('Chef', 'Cadastrou', qtd, unidade, nome);
            save();
            closeModal('modal-add');
            document.getElementById('new-nome').value = '';
            document.getElementById('new-qtd').value = '';
        }

        function openTransaction(id, type) {
            currentItemId = id;
            currentType = type;
            const item = db.items.find(i => i.id === id);
            document.getElementById('trans-title').innerText = type > 0 ? "Adicionar Carga" : "Retirar do Estoque";
            document.getElementById('trans-title').className = type > 0 ? "text-2xl font-black mb-2 italic text-green-500" : "text-2xl font-black mb-2 italic text-red-500";
            document.getElementById('trans-subtitle').innerText = item.nome;
            document.getElementById('trans-qtd').value = '';
            document.getElementById('trans-user').value = '';
            
            document.getElementById('trans-btn-confirm').onclick = confirmTransaction;
            openModal('modal-trans');
        }

        function confirmTransaction() {
            const qtyInput = parseFloat(document.getElementById('trans-qtd').value);
            const user = document.getElementById('trans-user').value;
            const item = db.items.find(i => i.id === currentItemId);

            if(isNaN(qtyInput) || qtyInput <= 0 || !user) return alert("Digite a quantidade e o seu nome!");

            const finalQty = qtyInput * currentType;
            item.qtd = parseFloat((item.qtd + finalQty).toFixed(2));
            if(item.qtd < 0) item.qtd = 0;

            addLog(user, currentType > 0 ? 'Abasteceu' : 'Retirou', qtyInput, item.unidade, item.nome);
            save();
            closeModal('modal-trans');
        }

        function addLog(user, acao, qtd, uni, item) {
            const data = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            db.logs.unshift({ id: Date.now(), msg: `[${data}] <b class="text-orange-500">${user}</b> ${acao.toLowerCase()} <b>${qtd}${uni}</b> de <b>${item}</b>` });
            db.logs = db.logs.slice(0, 15);
        }

        function save() {
            localStorage.setItem('asu_v5_db', JSON.stringify(db));
            render();
        }

        function render() {
            const grid = document.getElementById('grid-estoque');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let criticos = 0;
            grid.innerHTML = '';

            db.items.filter(i => i.nome.toLowerCase().includes(search)).forEach(item => {
                const isCritico = item.qtd <= item.min;
                if(isCritico) criticos++;

                grid.innerHTML += `
                    <div class="card-asu p-6 rounded-[2.5rem] shadow-xl flex flex-col justify-between h-56">
                        <div class="flex justify-between items-start">
                            <div class="max-w-[150px]">
                                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest truncate mb-1">${item.nome}</h3>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-4xl font-black text-white">${item.qtd}</span>
                                    <span class="text-slate-500 text-sm font-bold">${item.unidade}</span>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="openTransaction(${item.id}, 1)" class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center font-bold text-xl">+</button>
                                <button onclick="openTransaction(${item.id}, -1)" class="w-12 h-12 bg-slate-700 rounded-2xl flex items-center justify-center font-bold text-xl">-</button>
                            </div>
                        </div>
                        <div class="flex justify-between items-end border-t border-slate-700/50 pt-4">
                            <div class="${isCritico ? 'animate-pulse' : 'invisible'}">
                                <span class="text-[9px] bg-red-600 text-white px-2 py-1 rounded-full font-black uppercase">Crítico</span>
                            </div>
                            <button onclick="deleteItem(${item.id})" class="text-slate-600 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('log-container').innerHTML = db.logs.map(l => `<div class="text-[11px] text-slate-400 border-b border-slate-800/50 pb-1">${l.msg}</div>`).join('');
            document.getElementById('badge-critico').innerText = criticos;
            lucide.createIcons();
        }

        function deleteItem(id) { if(confirm("Remover insumo do ASU?")) { db.items = db.items.filter(i => i.id !== id); save(); } }
        function limparHistorico() { if(confirm("Limpar log?")) { db.logs = []; save(); } }

        render();
        lucide.createIcons();
    </script>
</body>
</html>
