<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ASU estoques | Central</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .asu-card { background: #1e293b; border: 1px solid #334155; border-radius: 2rem; padding: 1.5rem; transition: all 0.2s; }
        input::-webkit-inner-spin-button { display: none; }
        .outline-text { color: black; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }
        .critical-alert { border: 2px solid #ef4444 !important; background-color: #450a0a !important; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-700 p-4 shadow-xl">
        <div class="max-w-lg mx-auto flex justify-center items-center relative">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white text-center">
                ASU <span class="outline-text">estoques</span>
            </h1>
            <button onclick="document.getElementById('modal-add').classList.remove('hidden')" class="absolute right-0 bg-orange-600 p-2 rounded-xl shadow-lg active:scale-90 transition-all">
                <i data-lucide="plus" class="text-white w-6 h-6"></i>
            </button>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto space-y-4">
        <div id="status-cloud" class="text-[10px] font-black uppercase text-center text-slate-500 italic">Sincronizando...</div>
        <input type="text" id="search" oninput="renderStockItems()" placeholder="Buscar insumo..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:border-orange-500 text-white">
        <div id="grid" class="space-y-4"></div>
    </main>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-black mb-6 italic uppercase text-white text-center">Cadastrar no ASU</h2>
            <div class="space-y-4">
                <input type="text" id="add-nome" placeholder="Nome do insumo (ÚNICO)" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
                <div class="flex gap-2">
                    <input type="number" id="add-qtd" placeholder="Qtd Inicial" class="w-1/2 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
                    <select id="add-unidade" class="w-1/2 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white font-bold uppercase outline-none">
                        <option value="kg">kg</option><option value="un">un</option><option value="L">L</option><option value="g">g</option>
                    </select>
                </div>
                <input type="number" id="add-min" placeholder="Aviso de Mínimo (ex: 5)" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="document.getElementById('modal-add').classList.add('hidden')" class="flex-1 font-bold text-slate-500 uppercase text-xs">Voltar</button>
                <button onclick="addNewStockItem()" class="flex-1 py-4 bg-orange-600 rounded-xl font-bold text-white shadow-lg uppercase text-xs">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fzdwzmaqhttlljobjpky.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6ZHd6bWFxaHR0bGxqb2JqcGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM1MDgsImV4cCI6MjA5MDQ3OTUwOH0.OnE6ZwUSjSdw8G0BrB7G6sabhTHVZ7-E5Fx_UB4gXSc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentStockData = [];

        async function loadStockData() {
            const statusLabel = document.getElementById('status-cloud');
            const { data, error } = await supabaseClient.from('estoque_asu').select('*').order('nome');
            
            if (error) { 
                statusLabel.innerHTML = `<span class="text-red-500 font-bold uppercase">Erro: ${error.message}</span>`; 
                return; 
            }
            
            currentStockData = data;
            statusLabel.innerHTML = '<span class="text-green-500 italic font-bold">● ASU Cloud On-line</span>';
            renderStockItems();
        }

        async function addNewStockItem() {
            const nome = document.getElementById('add-nome').value;
            const qtd = parseFloat(document.getElementById('add-qtd').value);
            const unidade = document.getElementById('add-unidade').value;
            const min = parseFloat(document.getElementById('add-min').value) || 2;
            
            if(!nome || isNaN(qtd)) {
                alert("Preencha nome e quantidade!");
                return;
            }
            
            const user = prompt("Quem está cadastrando?");
            if(!user) return;

            const { error } = await supabaseClient.from('estoque_asu').insert([{ 
                nome, qtd, unidade, min, last_log: `${user} cadastrou.` 
            }]);

            if(error) {
                alert("Erro ao salvar (Lembre-se: O nome não pode ser repetido!): " + error.message);
            } else {
                document.getElementById('modal-add').classList.add('hidden');
                document.getElementById('add-nome').value = '';
                document.getElementById('add-qtd').value = '';
                document.getElementById('add-min').value = '';
                loadStockData();
            }
        }

        // AGORA BUSCA PELO NOME EM VEZ DO ID
        async function updateStockItemQuantity(nome, qtdAtual, operacao, uni) {
            const acaoStr = operacao === 'add' ? 'adicionar' : 'retirar';
            const strValor = prompt(`Quantos '${uni}' deseja ${acaoStr} de ${nome}?`);
            if(!strValor) return;
            
            const valorNum = parseFloat(strValor.replace(',', '.'));
            if(isNaN(valorNum) || valorNum <= 0) {
                alert("Digite um número válido maior que zero!");
                return;
            }

            const user = prompt("Quem está alterando? (Seu nome)");
            if(!user) return;

            const qtdAtualCerta = parseFloat(qtdAtual);
            const mudanca = operacao === 'add' ? valorNum : -valorNum;
            const novaQtd = Math.max(0, parseFloat((qtdAtualCerta + mudanca).toFixed(2)));
            
            const textoAcao = operacao === 'add' ? 'Adicionou' : 'Retirou';
            const logEntry = `${user} ${textoAcao} ${valorNum}${uni}`;

            // ATUALIZA USANDO O .eq('nome', nome)
            const { error } = await supabaseClient.from('estoque_asu').update({ 
                qtd: novaQtd, 
                last_log: logEntry 
            }).eq('nome', nome);

            if(error) {
                alert("Erro ao atualizar: " + error.message);
            } else {
                loadStockData();
            }
        }

        async function deleteStockItem(nome) {
            if(confirm(`Tem certeza que deseja excluir ${nome} do ASU?`)) { 
                // DELETA USANDO O .eq('nome', nome)
                await supabaseClient.from('estoque_asu').delete().eq('nome', nome); 
                loadStockData(); 
            }
        }

        function renderStockItems() {
            const itemGrid = document.getElementById('grid');
            const searchQuery = document.getElementById('search').value.toLowerCase();
            itemGrid.innerHTML = '';
            
            const filtrados = currentStockData.filter(item => item.nome.toLowerCase().includes(searchQuery));

            if(filtrados.length === 0) {
                itemGrid.innerHTML = '<p class="py-10 text-slate-500 text-xs font-black uppercase text-center italic">Nenhum item encontrado.</p>';
                return;
            }

            filtrados.forEach(item => {
                const isCritical = parseFloat(item.qtd) <= parseFloat(item.min || 2);
                const nomeSeguro = item.nome.replace(/'/g, "\\'");

                itemGrid.innerHTML += `
                    <div class="asu-card flex flex-col ${isCritical ? 'critical-alert' : ''}">
                        <div class="flex justify-between items-center w-full">
                            <div class="text-left w-2/3">
                                <p class="text-[12px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">${item.nome}</p>
                                <p class="text-4xl font-black text-white leading-none">${item.qtd}<span class="text-xs text-slate-400 ml-1 italic uppercase">${item.unidade}</span></p>
                                <p class="text-[10px] text-red-400 mt-1 uppercase font-bold tracking-widest ${isCritical ? 'block' : 'hidden'}">⚠️ Estoque Baixo</p>
                            </div>
                            <div class="flex gap-2 w-1/3 justify-end">
                                <button onclick="updateStockItemQuantity('${nomeSeguro}', '${item.qtd}', 'sub', '${item.unidade}')" class="w-12 h-12 bg-slate-700 rounded-2xl font-bold text-3xl text-white shadow-xl flex items-center justify-center pb-1">-</button>
                                <button onclick="updateStockItemQuantity('${nomeSeguro}', '${item.qtd}', 'add', '${item.unidade}')" class="w-12 h-12 bg-orange-600 rounded-2xl font-bold text-3xl text-white shadow-xl flex items-center justify-center pb-1">+</button>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-700/50 flex justify-between items-center">
                            <div class="bg-black/40 p-3 rounded-xl flex-1 mr-4 border border-slate-700">
                                <p class="text-[9px] text-slate-500 uppercase font-black mb-1 tracking-widest">Última Movimentação:</p>
                                <p class="text-xs font-black text-orange-400">${item.last_log || 'Nenhum registro'}</p>
                            </div>
                            <button onclick="deleteStockItem('${nomeSeguro}')" class="p-3 text-slate-600 hover:text-red-500 bg-slate-900 rounded-xl shadow-inner"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        window.onload = loadStockData;
        setInterval(loadStockData, 5000);
    </script>
</body>
</html>
