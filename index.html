<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>ASU estoques | Central</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .asu-card { background: #1e293b; border: 1px solid #334155; border-radius: 2rem; padding: 1.5rem; transition: all 0.2s; }
        .outline-text { color: black; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }
        .critical-alert { border: 2px solid #ef4444 !important; background-color: #450a0a !important; }
        .historico-scroll::-webkit-scrollbar { width: 4px; }
        .historico-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .mise-item { border-left: 4px solid #ef4444; background: #1e293b; padding: 1rem; border-radius: 1rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-700 p-4 shadow-xl">
        <div class="max-w-lg mx-auto flex justify-between items-center h-10">
            <button onclick="gerarListaMise()" class="bg-red-600/20 text-red-500 border border-red-500/50 px-4 py-2 rounded-xl font-black italic uppercase text-[10px] flex items-center gap-2 active:scale-90 transition-all">
                <i data-lucide="utensils"></i> MISE
            </button>

            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">
                ASU <span class="outline-text">estoques</span>
            </h1>
            
            <div class="flex gap-2">
                <button onclick="abrirRelatorio()" class="bg-slate-700 p-2 rounded-xl border border-slate-600">
                    <i data-lucide="clipboard-list" class="text-white w-5 h-5"></i>
                </button>
                <button onclick="document.getElementById('modal-add').classList.remove('hidden')" class="bg-orange-600 p-2 rounded-xl shadow-lg active:scale-90 transition-all">
                    <i data-lucide="plus" class="text-white w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto space-y-4">
        <div id="status-cloud" class="text-[10px] font-black uppercase text-center text-slate-500 italic">Sincronizando...</div>
        <input type="text" id="search" oninput="renderStockItems()" placeholder="Buscar insumo..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:border-orange-500 text-white">
        <div id="grid" class="space-y-4"></div>
    </main>

    <div id="modal-mise" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] border border-red-500/30 shadow-2xl flex flex-col h-[80vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic uppercase text-red-500">Mise en Place</h2>
                <button onclick="document.getElementById('modal-mise').classList.add('hidden')" class="bg-slate-800 p-2 rounded-xl">
                    <i data-lucide="x" class="text-white w-6 h-6"></i>
                </button>
            </div>
            <div id="mise-content" class="flex-1 overflow-y-auto pr-2 historico-scroll"></div>
            <button onclick="window.print()" class="mt-4 w-full py-4 bg-white text-black font-black uppercase italic rounded-2xl text-xs">Imprimir / PDF</button>
        </div>
    </div>

    <div id="modal-report" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-800 w-full max-w-md p-6 rounded-[2rem] border border-slate-700 flex flex-col h-[85vh]">
            <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                <h2 class="text-lg font-black italic uppercase text-white">Relatório Geral</h2>
                <button onclick="document.getElementById('modal-report').classList.add('hidden')" class="bg-slate-700 p-2 rounded-xl"><i data-lucide="x" class="text-white w-5 h-5"></i></button>
            </div>
            <div id="report-content" class="flex-1 overflow-y-auto space-y-3 historico-scroll"></div>
        </div>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-black mb-6 italic uppercase text-white text-center">Novo Insumo</h2>
            <div class="space-y-4">
                <input type="text" id="add-nome" placeholder="NOME DO ITEM" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
                <div class="flex gap-2">
                    <input type="number" id="add-qtd" placeholder="QTD" class="w-1/2 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
                    <select id="add-unidade" class="w-1/2 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white font-bold uppercase outline-none">
                        <option value="kg">kg</option><option value="un">un</option><option value="L">L</option><option value="g">g</option>
                    </select>
                </div>
                <input type="number" id="add-min" placeholder="ESTOQUE MÍNIMO" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="document.getElementById('modal-add').classList.add('hidden')" class="flex-1 font-bold text-slate-500 uppercase text-xs">Voltar</button>
                <button onclick="addNewStockItem()" class="flex-1 py-4 bg-orange-600 rounded-xl font-bold text-white shadow-lg uppercase text-xs">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fzdwzmaqhttlljobjpky.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6ZHd6bWFxaHR0bGxqb2JqcGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM1MDgsImV4cCI6MjA5MDQ3OTUwOH0.OnE6ZwUSjSdw8G0BrB7G6sabhTHVZ7-E5Fx_UB4gXSc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentStockData = [];

        async function loadStockData() {
            const { data, error } = await supabaseClient.from('estoque_asu').select('*').order('nome');
            if (error) return;
            currentStockData = data || [];
            document.getElementById('status-cloud').innerHTML = '<span class="text-green-500 italic font-bold">● ASU Cloud On-line</span>';
            renderStockItems();
        }

        function gerarListaMise() {
            const container = document.getElementById('mise-content');
            container.innerHTML = '';
            const itensBaixos = currentStockData.filter(i => (parseFloat(i.qtd)||0) <= (parseFloat(i.min)||2));
            if (itensBaixos.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 uppercase text-xs mt-10">Tudo ok!</p>';
            } else {
                itensBaixos.forEach(i => {
                    container.innerHTML += `<div class="mise-item"><p class="text-white font-black uppercase">${i.nome}</p><p class="text-red-400 text-[10px] font-bold">FALTA REPOR: ${i.qtd} ${i.unidade}</p></div>`;
                });
            }
            document.getElementById('modal-mise').classList.remove('hidden');
            lucide.createIcons();
        }

        async function addNewStockItem() {
            const nome = document.getElementById('add-nome').value.trim();
            const qtd = parseFloat(document.getElementById('add-qtd').value);
            const unidade = document.getElementById('add-unidade').value;
            const min = parseFloat(document.getElementById('add-min').value) || 2;
            if(!nome || isNaN(qtd)) return;
            const user = prompt("Quem está cadastrando?");
            if(!user) return;
            const { error } = await supabaseClient.from('estoque_asu').insert([{ nome, qtd, unidade, min, last_log: `[${new Date().toLocaleDateString('pt-BR')} 00:00] ${user} cadastrou o item.` }]);
            if(!error) { document.getElementById('modal-add').classList.add('hidden'); loadStockData(); }
        }

        async function updateStockItemQuantity(nome, qtdAtual, operacao, uni) {
            const strValor = prompt(`Qtd a ${operacao === 'add' ? 'adicionar' : 'retirar'} em ${nome}:`);
            const user = prompt("Seu nome:");
            if(!strValor || !user) return;
            const valorNum = parseFloat(strValor.replace(',', '.'));
            const novaQtd = Math.max(0, parseFloat((parseFloat(qtdAtual) + (operacao === 'add' ? valorNum : -valorNum)).toFixed(2)));
            const logNovo = `[${new Date().toLocaleDateString('pt-BR')} ${new Date().getHours()}:${new Date().getMinutes()}] ${user} ${operacao === 'add' ? 'Add' : 'Ret'} ${valorNum}${uni}`;
            const item = currentStockData.find(i => i.nome === nome);
            let logs = item.last_log ? String(item.last_log).split('|').slice(0,19) : [];
            logs.unshift(logNovo);
            await supabaseClient.from('estoque_asu').update({ qtd: novaQtd, last_log: logs.join('|') }).eq('nome', nome);
            loadStockData();
        }

        async function deleteStockItem(nome) {
            if(confirm(`Excluir ${nome}?`)) { await supabaseClient.from('estoque_asu').delete().eq('nome', nome); loadStockData(); }
        }

        function abrirRelatorio() {
            const container = document.getElementById('report-content');
            container.innerHTML = '';
            let logs = [];
            currentStockData.forEach(i => { if(i.last_log) String(i.last_log).split('|').forEach(l => logs.push({n: i.nome, t: l})); });
            logs.forEach(r => { container.innerHTML += `<div class="p-2 border border-slate-700 bg-slate-900 rounded-lg mb-2"><p class="text-[9px] text-slate-500 uppercase">${r.n}</p><p class="text-xs font-bold text-orange-400">${r.t}</p></div>`; });
            document.getElementById('modal-report').classList.remove('hidden');
        }

        function renderStockItems() {
            const grid = document.getElementById('grid');
            const search = (document.getElementById('search').value || '').toLowerCase();
            grid.innerHTML = '';
            currentStockData.filter(i => String(i.nome).toLowerCase().includes(search)).forEach(item => {
                const isCrit = (parseFloat(item.qtd)||0) <= (parseFloat(item.min)||2);
                grid.innerHTML += `<div class="asu-card ${isCrit?'critical-alert':''}"><div class="flex justify-between items-center"><div class="w-2/3"><p class="text-[11px] font-black text-slate-400 uppercase truncate">${item.nome}</p><p class="text-4xl font-black text-white leading-none">${item.qtd}<span class="text-xs text-slate-400 ml-1 uppercase">${item.unidade}</span></p></div><div class="flex gap-2"><button onclick="updateStockItemQuantity('${item.nome}','${item.qtd}','sub','${item.unidade}')" class="w-12 h-12 bg-slate-700 rounded-2xl text-2xl text-white font-bold">-</button><button onclick="updateStockItemQuantity('${item.nome}','${item.qtd}','add','${item.unidade}')" class="w-12 h-12 bg-orange-600 rounded-2xl text-2xl text-white font-bold">+</button></div></div><div class="mt-4 flex justify-between items-center"><div class="text-[9px] font-black text-slate-500 uppercase">Mín: ${item.min}</div><button onclick="deleteStockItem('${item.nome}')" class="text-slate-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
            });
            lucide.createIcons();
        }

        window.onload = loadStockData;
        setInterval(loadStockData, 5000);
    </script>
</body>
</html>
