<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASU estoques | Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .asu-card { background: #1e293b; border: 1px solid #334155; transition: all 0.2s ease; }
        .asu-card:active { transform: scale(0.98); }
        input::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-orange-500 p-4 shadow-xl text-center">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">ASU <span class="text-orange-500">estoques</span></h1>
            <button onclick="document.getElementById('modal-add').classList.remove('hidden')" class="bg-orange-600 p-3 rounded-xl shadow-lg active:scale-90 transition-all">
                <i data-lucide="plus" class="text-white"></i>
            </button>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto space-y-4">
        <input type="text" id="search" oninput="render()" placeholder="Buscar insumo no ASU..." 
            class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:border-orange-500 text-lg shadow-inner">

        <div id="grid" class="space-y-3">
            <p class="text-slate-500 text-center py-10 animate-pulse font-bold uppercase text-[10px]">Conectando à nuvem ASU...</p>
        </div>
    </main>

    <div id="modal-trans" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-t-[2.5rem] sm:rounded-[2.5rem] border-t border-slate-700 shadow-2xl">
            <h2 id="trans-title" class="text-2xl font-black mb-1 italic uppercase text-white">Operação</h2>
            <p id="trans-item-nome" class="text-orange-500 font-bold uppercase text-[10px] mb-6 tracking-widest"></p>
            
            <div class="space-y-5">
                <input type="number" id="trans-qtd" placeholder="Quantidade" class="w-full bg-slate-900 p-5 rounded-2xl border border-slate-700 text-3xl font-black text-center outline-none focus:border-orange-500 text-white">
                <input type="text" id="trans-user" placeholder="Seu nome" class="w-full bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none text-white">
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="document.getElementById('modal-trans').classList.add('hidden')" class="flex-1 py-4 font-bold text-slate-500 uppercase text-xs">Voltar</button>
                <button id="btn-confirm" class="flex-1 py-4 bg-orange-600 rounded-2xl font-bold text-white shadow-lg active:scale-95 uppercase text-xs">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-black mb-6 italic uppercase text-white tracking-widest">Cadastrar Insumo</h2>
            <div class="space-y-4">
                <input type="text" id="add-nome" placeholder="Nome do Insumo" class="w-full bg-slate-900 p-4 rounded-xl outline-none border border-slate-700 text-white">
                <div class="flex gap-2">
                    <input type="number" id="add-qtd" placeholder="Qtd Inicial" class="w-1/2 bg-slate-900 p-4 rounded-xl outline-none border border-slate-700 text-white">
                    <select id="add-unidade" class="w-1/2 bg-slate-900 p-4 rounded-xl outline-none border border-slate-700 text-white">
                        <option value="kg">kg</option><option value="un">un</option><option value="L">L</option><option value="g">g</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="document.getElementById('modal-add').classList.add('hidden')" class="flex-1 text-slate-500 font-bold uppercase text-xs">Cancelar</button>
                <button onclick="addItem()" class="flex-1 py
