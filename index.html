<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ASU estoques | Central</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .asu-card { background: #1e293b; border: 1px solid #334155; border-radius: 2rem; padding: 1.5rem; transition: all 0.2s; }
        input::-webkit-inner-spin-button { display: none; }
        .outline-text { color: black; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }
        .critical-alert { border: 2px solid #ef4444 !important; background-color: #450a0a !important; }
        .historico-scroll::-webkit-scrollbar { width: 4px; }
        .historico-scroll::-webkit-scrollbar-track { background: transparent; }
        .historico-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .mise-item { border-left: 4px solid #ef4444; background: #1e293b; padding: 1rem; border-radius: 1rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-700 p-4 shadow-xl">
        <div class="max-w-lg mx-auto flex justify-between items-center h-10">
            <button onclick="gerarListaMise()" class="bg-red-600/20 text-red-500 border border-red-500/50 px-3 py-1.5 rounded-xl font-black italic uppercase text-[10px] flex items-center gap-1 active:scale-90 transition-all">
                <i data-lucide="chef-hat" class="w-4 h-4"></i> MISE
            </button>

            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">
                ASU <span class="outline-text">estoques</span>
            </h1>
            
            <div class="flex gap-2">
                <button onclick="abrirRelatorio()" class="bg-slate-700 p-2 rounded-xl border border-slate-600">
                    <i data-lucide="clipboard-list" class="text-white w-5 h-5"></i>
                </button>
                <button onclick="document.getElementById('modal-add').classList.remove('hidden')" class="bg-orange-600 p-2 rounded-xl shadow-lg active:scale-90 transition-all">
                    <i data-lucide="plus" class="text-white w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto space-y-4">
        <div id="status-cloud" class="text-[10px] font-black uppercase text-center text-slate-500 italic">Conectando...</div>
        <input type="text" id="search" oninput="renderStockItems()" placeholder="Buscar no estoque..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:border-orange-500 text-white shadow-inner">
        <div id="grid" class="space-y-4"></div>
    </main>

    <div id="modal-mise" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-[2.5rem] border border-red-500/30 shadow-2xl flex flex-col h-[80vh]">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-black italic uppercase text-red-500 leading-none">Mise en Place</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 italic">Itens com estoque baixo (Vermelho)</p>
                </div>
                <button onclick="document.getElementById('modal-mise').classList.add('hidden')" class="bg-slate-800 p-2 rounded-xl">
                    <i data-lucide="x" class="text-white w-6 h-6"></i>
                </button>
            </div>
            
            <div id="mise-content" class="flex-1 overflow-y-auto pr-2 historico-scroll">
                </div>

            <button onclick="window.print()" class="mt-4 w-full py-4 bg-white text-black font-black uppercase italic rounded-2xl text-xs active:scale-95 transition-all">
                Imprimir / Salvar PDF
            </button>
        </div>
    </div>

    <div id="modal-report" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-800 w-full max-w-md p-6 rounded-[2rem] border border-slate-700 shadow-2xl flex flex-col h-[85vh]">
            <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                <h2 class="text-lg font-black italic uppercase text-white leading-none">Relatório Geral</h2>
                <button onclick="document.getElementById('modal-report').classList.add('hidden')" class="bg-slate-700 p-2 rounded-xl"><i data-lucide="x" class="text-white w-5 h-5"></i></button>
            </div>
            <div id="report-content" class="flex-1 overflow-y-auto space-y-3 historico-scroll"></div>
        </div>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2
