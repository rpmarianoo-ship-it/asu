    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6ZHd6bWFxaHR0bGxqb2JqcGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM1MDgsImV4cCI6MjA5MDQ3OTUwOH0.OnE6ZwUSjSdw8G0BrB7G6sabhTHVZ7-E5Fx_UB4gXSc';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let estoqueLocal = [];

    async function carregarDados() {
        // AQUI ESTÁ O SEGREDO: MUDAMOS PARA 'asu' PARA BATER COM SEU PRINT
        const { data, error } = await supabaseClient.from('asu').select('*').order('nome');
        
        if (error) {
            console.error(error);
            document.getElementById('status-cloud').innerHTML = `<span class="text-red-500 font-bold uppercase text-[8px]">Erro: ${error.message}</span>`;
            return;
        }
        
        estoqueLocal = data;
        document.getElementById('status-cloud').innerHTML = '<span class="text-green-500 italic">● ASU Cloud Online</span>';
        render();
    }

    async function addItem() {
        const nome = document.getElementById('add-nome').value;
        const qtd = parseFloat(document.getElementById('add-qtd').value);
        const unidade = document.getElementById('add-unidade').value;
        if(!nome || isNaN(qtd)) return;

        // AQUI TAMBÉM MUDAMOS PARA 'asu'
        const { error } = await supabaseClient.from('asu').insert([{ nome, qtd, unidade, min: 2, last_log: 'Cadastro Inicial' }]);
        if (error) alert("Erro ao salvar! Verifique se o RLS está desativado.");
        
        document.getElementById('modal-add').classList.add('hidden');
        carregarDados();
    }

    // ... o restante da função alterar e render também devem usar .from('asu') ...
</script>
