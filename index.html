<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASU estoques | Sistema Central</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .asu-card { background: #1e293b; border: 1px solid #334155; border-radius: 2rem; padding: 1.5rem; transition: all 0.2s; }
        .asu-card:active { transform: scale(0.97); }
        input::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-orange-500 p-4 shadow-xl flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">ASU <span class="text-orange-500">estoques</span></h1>
        <button onclick="document.getElementById('modal-add').classList.remove('hidden')" class="bg-orange-600 p-3 rounded-xl shadow-lg active:scale-90 transition-all">
            <i data-lucide="plus" class="text-white"></i>
        </button>
    </header>

    <main class="p-4 max-w-lg mx-auto space-y-4">
        <div id="status-cloud" class="text-[10px] font-black uppercase text-center text-slate-500 italic">Sincronizando com ASU Cloud...</div>
        
        <input type="text" id="search" oninput="render()" placeholder="Buscar item no estoque..." 
            class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:border-orange-500 text-white shadow-inner">

        <div id="grid" class="space-y-3">
            </div>
    </main>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-800 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-black mb-6 italic uppercase text-white tracking-widest text-center">Novo Insumo ASU</h2>
            <div class="space-y-4">
                <input type="text" id="add-nome" placeholder="Nome do Insumo" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
                <div class="flex gap-2">
                    <input type="number" id="add-qtd" placeholder="Qtd" class="w-1/2 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white outline-none">
                    <select id="add-unidade" class="w-1/2 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white font-bold outline-none uppercase">
                        <option value="kg">kg</option>
                        <option value="un">un</option>
                        <option value="L">L</option>
                        <option value="g">g</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="document.getElementById('modal-add').classList.add('hidden')" class="flex-1 font-bold text-slate-500 uppercase text-xs">Voltar</button>
                <button onclick="addItem()" class="flex-1 py-4 bg-orange-600 rounded-xl font-bold text-white uppercase text-xs shadow-lg">Cadastrar</button>
            </div>
        </div>
    </div>
